<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="cabecalho">
      <!-- Logo -->
      <div>
        <a href="../index.html">
          <img
            class="logo"
            src="../IMG/WhatsApp Image 2025-08-20 at 12.23.42.jpeg"
            alt="logo da Nicole Show"
          />
        </a>
      </div>

      <!-- Barra de pesquisa -->
      <div class="search-box">
        <input type="text" placeholder="Pesquisar..." />
        <button><i class="fas fa-search"></i></button>
      </div>

      <!-- Ícones -->
      <div class="icons">
  
              <!-- Botão Voltar -->
      <button id="btn-voltar" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

        <button id="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="menu-items" id="menu-items">
       <!-- carrinho -->
          <button id="btn-carrinho">
          <i class="fas fa-shopping-cart"></i>
          <span id="qtd-carrinho">0</span>
        </button>
           <!-- Botão de perfil -->
        <button id="btn-perfil">
          <i class="fas fa-user"></i>
        </button>
          <button><i class="fas fa-bell"></i></button>
        </div>
      </div>
    </header>

  <main class="main">
  <h1>🛒 Carrinho</h1>

  <!-- Lista de itens do carrinho -->
  <div id="itens-carrinho"></div>

  <!-- Resumo do carrinho -->
  <div class="resumo-carrinho">
    <p>Total de itens: <span id="total-itens">0</span></p>
    <p>Valor total: R$ <span id="total-valor">0.00</span></p>
    <button id="btn-finalizar">Finalizar Pedido</button>
  </div>

  <!-- Modal de resumo do pedido -->
  <div id="modal-resumo" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Resumo do Pedido</h2>
      <div id="resumo-itens"></div>
      <p>Total: R$ <span id="resumo-total">0.00</span></p>
      <form id="form-pedido">
        <input type="text" placeholder="Nome" required />
        <input type="text" placeholder="Endereço" required />
        <input type="text" placeholder="Telefone" required />
        <textarea placeholder="Observações"></textarea>
        <button type="submit">Confirmar Pedido</button>
      </form>
    </div>
  </div>
</main>


    <footer class="footer">
      <div class="footer-content">
        <div class="footer-logo">
          <p>© 2025 Nicole Show. Todos os direitos reservados.</p>
        </div>
        <div class="footer-container">
          <h3>Siga-nos</h3>
          <div class="social-icons">
            <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
          </div>
        </div>
        <div class="footer-bottom">
          <p>Desenvolvido por Gabriel, <span>Versão 0.1</span></p>
        </div>
      </div>
    </footer>

    <!-- Script do carrinho -->
     <script src="../JS/carrinho.js"></script>
    <script src="../JS/script.js" defer></script>
  </body>
</html>
